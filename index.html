<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostCam P2P - Netlify</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; }
        video { width: 90%; max-width: 500px; border: 1px solid #0f0; border-radius: 8px; }
        .btn { background: #0f0; color: #000; padding: 15px; border: none; cursor: pointer; margin: 10px; font-weight: bold; }
        #status { color: yellow; margin: 10px; }
    </style>
</head>
<body>
    <h1>🧿 GHOST-CAM REMOTE</h1>
    <div id="status">Cargando sistema...</div>
    
    <div id="setup">
        <button class="btn" onclick="iniciarComoCamera()">MODO CÁMARA (Vigilante)</button>
        <button class="btn" onclick="iniciarComoMonitor()">MODO MONITOR (Observador)</button>
    </div>

    <div id="display" style="display:none;">
        <h3 id="role-title"></h3>
        <video id="remoteVideo" autoplay playsinline></video>
        <p id="peer-id-display"></p>
    </div>

    <script>
        const peer = new Peer(); // Crea un ID único automático
        let myId = "";

        peer.on('open', (id) => {
            myId = id;
            document.getElementById('status').innerText = "Sistema Listo.";
        });

        // --- MODO CÁMARA ---
        function iniciarComoCamera() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            document.getElementById('role-title').innerText = "EMITIENDO SEÑAL...";
            document.getElementById('peer-id-display').innerText = "ID de conexión: " + myId;
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true })
                .then(stream => {
                    const video = document.getElementById('remoteVideo');
                    video.srcObject = stream;
                    video.muted = true;

                    // Esperar a que el monitor llame
                    peer.on('call', (call) => {
                        call.answer(stream);
                        document.getElementById('status').innerText = "¡MONITOR CONECTADO!";
                    });
                });
        }

        // --- MODO MONITOR ---
        function iniciarComoMonitor() {
            const idCamara = prompt("Introduce el ID de la Cámara:");
            if (!idCamara) return;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            document.getElementById('role-title').innerText = "RECIBIENDO SEÑAL...";

            const call = peer.call(idCamara, null); // Llamar a la cámara sin enviar nuestro video
            
            call.on('stream', (remoteStream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = remoteStream;
                document.getElementById('status').innerText = "RECIBIENDO VIDEO EN VIVO";
            });
        }
    </script>
</body>
</html>
